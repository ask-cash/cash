# Local end-to-end stack mirroring the K8s topology:
# gateway + worker + connector against Postgres, Redis, and minio (S3).
#
#   docker compose up --build
#
# Then onboard a tenant:
#   curl -XPOST localhost:8080/admin/tenants -H "X-Admin-Token: dev-admin" \
#        -H 'content-type: application/json' \
#        -d '{"display_name":"Suhail","telegram_bot_token":"<token>","owner_telegram_id":123}'

x-app-env: &app-env
  DATABASE_URL: postgresql://cash:cash@postgres:5432/cash
  REDIS_URL: redis://redis:6379/0
  STORAGE_BACKEND: s3
  S3_BUCKET: cash-uploads
  S3_ENDPOINT_URL: http://minio:9000
  S3_REGION: us-east-1
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  SECRETS_BACKEND: db
  # Dev-only Fernet key — MUST be a valid 32-byte url-safe base64 key, else
  # per-tenant token encryption (and therefore bot onboarding) fails. Generate
  # your own / prod keys with:
  #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:-TDmXj1OoypbO7JYjFJQiBfMgXSpq2i4w0bmy8S1Erfk=}
  ENFORCE_TENANT: "true"
  TELEGRAM_WEBHOOK_SECRET: dev-webhook-secret
  ADMIN_API_TOKEN: dev-admin
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
  GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
  TRANSCRIPTION_API_KEY: ${TRANSCRIPTION_API_KEY:-}
  TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
  FREE_CHAT_CONTEXT_TOKENS: ${FREE_CHAT_CONTEXT_TOKENS:-32000}
  FREE_CHAT_MODELS: ${FREE_CHAT_MODELS:-claude-haiku-4-5-20251001}
  WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
  CHAT_LOCK_TTL_SECONDS: ${CHAT_LOCK_TTL_SECONDS:-600}
  CHAT_GLOBAL_CONCURRENCY: ${CHAT_GLOBAL_CONCURRENCY:-80}
  CHAT_CONCURRENCY_LEASE_SECONDS: ${CHAT_CONCURRENCY_LEASE_SECONDS:-720}
  TRANSCRIPTION_GLOBAL_CONCURRENCY: ${TRANSCRIPTION_GLOBAL_CONCURRENCY:-20}
  TRANSCRIPTION_CONCURRENCY_LEASE_SECONDS: ${TRANSCRIPTION_CONCURRENCY_LEASE_SECONDS:-180}
  QUEUE_HEARTBEAT_SECONDS: ${QUEUE_HEARTBEAT_SECONDS:-60}
  QUEUE_ENQUEUE_DEDUPE_SECONDS: ${QUEUE_ENQUEUE_DEDUPE_SECONDS:-604800}
  REDIS_CONNECT_TIMEOUT_SECONDS: ${REDIS_CONNECT_TIMEOUT_SECONDS:-5}
  REDIS_SOCKET_TIMEOUT_SECONDS: ${REDIS_SOCKET_TIMEOUT_SECONDS:-10}
  LOG_LEVEL: INFO

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # Keep the bootstrap superuser separate from the application role.
      # PostgreSQL superusers bypass RLS, which would hide tenant-isolation bugs
      # during local testing. docker/postgres-init.sql creates the `cash` role
      # used by DATABASE_URL without SUPERUSER or BYPASSRLS.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cash
    # Host ports are env-overridable so the stack comes up even if you already
    # run Postgres/Redis/minio locally. Containers talk to each other over the
    # compose network (postgres:5432, redis:6379) regardless of these.
    ports: ["${POSTGRES_PORT_HOST:-5432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/10-cash-app-role.sql:ro

  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT_HOST:-6380}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["${MINIO_PORT_HOST:-9000}:9000", "${MINIO_CONSOLE_PORT_HOST:-9001}:9001"]
    volumes:
      - miniodata:/data

  createbucket:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
      /usr/bin/mc mb -p local/cash-uploads;
      exit 0;
      "

  gateway:
    build: .
    command: ["gateway"]
    environment:
      <<: *app-env
      # The web client is served same-origin behind nginx (the `client` service),
      # so OAuth redirects + the session cookie resolve against that origin.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8090}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:8090}
      GOOGLE_CREDENTIALS_PATH: ${GOOGLE_CREDENTIALS_PATH:-credentials.json}
      OAUTH_INTERNAL_URL: http://telegram:8401/oauth2callback
    volumes:
      # Google OAuth client for browser-initiated calendar/login connect.
      - ./credentials.json:/app/credentials.json:ro
    ports: ["${GATEWAY_PORT_HOST:-18080}:8080"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      # The runtime image has python but not curl; probe /readyz with urllib.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/readyz').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  worker:
    build: .
    command: ["worker"]
    environment:
      <<: *app-env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  # Long-polling Telegram from .env — no webhook / ngrok / PUBLIC_BASE_URL needed.
  # On startup it clears any webhook, so polling takes over from the gateway path.
  telegram:
    build: .
    command: ["telegram-poller"]
    environment:
      <<: *app-env
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      YOUR_TELEGRAM_USER_ID: ${YOUR_TELEGRAM_USER_ID:-}
      TG_OWNER_ID: ${TG_OWNER_ID:-}
      # Google OAuth for /connect_google. The callback server listens on
      # OAUTH_SERVER_PORT inside the container (published below). The redirect
      # URI must be reachable from your browser AND registered on your Google
      # OAuth client. http://localhost:8401/oauth2callback works for local use.
      OAUTH_SERVER_PORT: "8401"
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:8401/oauth2callback}
      GOOGLE_CREDENTIALS_PATH: ${GOOGLE_CREDENTIALS_PATH:-credentials.json}
      GOOGLE_TOKEN_PATH: ${GOOGLE_TOKEN_PATH:-token.json}
      GMAIL_TOKEN_PATH: ${GMAIL_TOKEN_PATH:-gmail_token.json}
    ports:
      - "${OAUTH_PORT_HOST:-8401}:8401"
    volumes:
      # credentials.json is excluded from the image (.dockerignore); mount it.
      - ./credentials.json:/app/credentials.json:ro
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  connector:
    build: .
    command: ["discord-connector"]
    environment:
      <<: *app-env
      CONNECTOR_SHARD_INDEX: "0"
      CONNECTOR_SHARD_TOTAL: "1"
      # Single-tenant local Discord bot straight from .env (no DB onboarding).
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_CASH_USER_ID: ${DISCORD_CASH_USER_ID:-}
      DISCORD_SUHAIL_USER_ID: ${DISCORD_SUHAIL_USER_ID:-}
      DISCORD_ALLOWED_GUILD_IDS: ${DISCORD_ALLOWED_GUILD_IDS:-}
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  # The web dashboard client (client/): Vite build served by nginx, which
  # reverse-proxies /api to the gateway so client + API are same-origin.
  # Open http://localhost:8090 after `docker compose up --build`.
  client:
    build: ./client
    ports: ["${CLIENT_PORT_HOST:-8090}:80"]
    depends_on:
      gateway: {condition: service_started}

volumes:
  pgdata:
  miniodata:
