name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint
        run: ruff check app services bot tests --select E9,F63,F7,F82
      - name: Unit tests
        env:
          DATABASE_URL: ""
          REDIS_URL: ""
          SECRETS_BACKEND: env
        run: python -m unittest discover -s tests -v

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cash
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d cash"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create non-RLS-bypass application role
        env:
          POSTGRES_CONTAINER: ${{ job.services.postgres.id }}
        run: |
          docker cp infra/docker/postgres-init.sql "$POSTGRES_CONTAINER:/tmp/postgres-init.sql"
          docker exec "$POSTGRES_CONTAINER" psql -U postgres -d cash -v ON_ERROR_STOP=1 -f /tmp/postgres-init.sql
      - name: PostgreSQL and Redis integration
        env:
          CASH_INTEGRATION_TEST: "1"
          DATABASE_URL: postgresql://cash:cash@127.0.0.1:5432/cash
          REDIS_URL: redis://127.0.0.1:6379/15
          QUEUE_NAME: cash:integration:${{ github.run_id }}
          QUEUE_CONSUMER_GROUP: cash-integration
          ENFORCE_TENANT: "true"
          SECRETS_BACKEND: env
          LOCAL_STORAGE_DIR: /tmp/cash-integration-uploads
        run: python -m tests.integration_backends

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        working-directory: client
        run: npm ci
      - name: Typecheck + production build
        working-directory: client
        run: npm run build

  landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - name: Install
        working-directory: landing
        run: npm ci
      - name: Typecheck + production build
        working-directory: landing
        run: npm run build
