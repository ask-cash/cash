name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cash
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d cash"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create non-RLS-bypass application role
        env:
          POSTGRES_CONTAINER: ${{ job.services.postgres.id }}
        run: |
          docker cp infra/docker/postgres-init.sql "$POSTGRES_CONTAINER:/tmp/postgres-init.sql"
          docker exec "$POSTGRES_CONTAINER" psql -U postgres -d cash -v ON_ERROR_STOP=1 -f /tmp/postgres-init.sql
      - name: PostgreSQL and Redis integration
        env:
          CASH_INTEGRATION_TEST: "1"
          DATABASE_URL: postgresql://cash:cash@127.0.0.1:5432/cash
          REDIS_URL: redis://127.0.0.1:6379/15
          QUEUE_NAME: cash:integration:${{ github.run_id }}
          QUEUE_CONSUMER_GROUP: cash-integration
          ENFORCE_TENANT: "true"
          SECRETS_BACKEND: env
          LOCAL_STORAGE_DIR: /tmp/cash-integration-uploads
        run: python -m tests.integration_backends

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint
        # Block correctness failures while older style-only lint debt is
        # reduced separately.
        run: ruff check app services bot tests --select E9,F63,F7,F82
      - name: Unit tests
        env:
          DATABASE_URL: ""
          REDIS_URL: ""
          SECRETS_BACKEND: env
        run: python -m unittest discover -s tests -v
      - name: Import smoke test
        env:
          DATABASE_URL: ""        # SQLite fallback
          SECRETS_BACKEND: env
        run: |
          python -c "import app.gateway, app.worker, app.cron, app.discord_connector, bot.app_factory"

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        working-directory: client
        run: npm ci
      - name: Typecheck + production build
        working-directory: client
        run: npm run build
      - name: Build client image
        run: docker build -t cash-client:ci ./client

  landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - name: Install
        working-directory: landing
        run: npm ci
      - name: Typecheck + production build
        working-directory: landing
        run: npm run build
      - name: Build landing image
        run: docker build -t cash-landing:ci ./landing

  docker:
    runs-on: ubuntu-latest
    needs: [python, client, landing, integration]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t cash:ci .

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint + template chart
        run: |
          helm lint infra/helm/cash
          helm template cash infra/helm/cash > /dev/null
          helm template cash infra/helm/cash \
            --set worker.keda.enabled=true \
            --set-string worker.keda.address=redis.internal:6379 > /dev/null

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: Validate
        run: |
          terraform -chdir=infra/terraform init -backend=false
          terraform -chdir=infra/terraform validate
