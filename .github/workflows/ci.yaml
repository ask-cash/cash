name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint
        run: ruff check . || true
      - name: Import smoke test
        env:
          DATABASE_URL: ""        # SQLite fallback
          SECRETS_BACKEND: env
        run: |
          python -c "import app.gateway, app.worker, app.cron, app.discord_connector, bot.app_factory"

  docker:
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t cash:ci .

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint + template chart
        run: |
          helm lint infra/helm/cash
          helm template cash infra/helm/cash > /dev/null
