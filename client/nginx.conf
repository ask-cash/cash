# Serve the SPA and reverse-proxy the API to the gateway. Same-origin means the
# session cookie and Google OAuth redirects work without CORS gymnastics.
server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    # API → gateway. API_UPSTREAM is rendered by the official nginx entrypoint:
    # Compose defaults to gateway:8080; Helm supplies cash-gateway:80.
    location /api/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 210s;
        proxy_send_timeout 210s;
    }

    # OAuth callback lands on the gateway too (Google redirects here).
    location /oauth2callback {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Magic-link, onboarding, and webhook routes are owned by the gateway.
    location /dashboard {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /onboard {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tg/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: serve static assets, fall back to index.html for client routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
