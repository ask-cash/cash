# Serve the SPA and reverse-proxy the API to the gateway. Same-origin means the
# session cookie and Google OAuth redirects work without CORS gymnastics.
server {
    listen 80;
    server_name _;

    # API → gateway (compose service name : internal port).
    location /api/ {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth callback lands on the gateway too (Google redirects here).
    location /oauth2callback {
        proxy_pass http://gateway:8080;
        proxy_set_header Host $host;
    }

    # SPA: serve static assets, fall back to index.html for client routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
