apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cash.name" . }}-client
  labels:
    {{- include "cash.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  replicas: {{ .Values.client.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cash.name" . }}
      app.kubernetes.io/component: client
  template:
    metadata:
      labels:
        {{- include "cash.labels" . | nindent 8 }}
        app.kubernetes.io/component: client
    spec:
      containers:
        - name: client
          image: {{ include "cash.clientImage" . }}
          imagePullPolicy: {{ .Values.client.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: API_UPSTREAM
              value: "http://{{ include "cash.name" . }}-gateway:80"
          readinessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /, port: http}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.client.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cash.name" . }}-client
  labels:
    {{- include "cash.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  selector:
    app.kubernetes.io/name: {{ include "cash.name" . }}
    app.kubernetes.io/component: client
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "cash.name" . }}-client
  labels:
    {{- include "cash.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cash.name" . }}
      app.kubernetes.io/component: client
{{- if .Values.client.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cash.name" . }}-client
  labels:
    {{- include "cash.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cash.name" . }}-client
  minReplicas: {{ .Values.client.hpa.minReplicas }}
  maxReplicas: {{ .Values.client.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.client.hpa.targetCPUUtilizationPercentage }}
{{- end }}
