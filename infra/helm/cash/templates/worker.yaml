apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cash.name" . }}-worker
  labels:
    {{- include "cash.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cash.name" . }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "cash.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: worker
          image: {{ include "cash.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["worker"]
          envFrom:
            {{- include "cash.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
---
{{- if .Values.worker.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cash.name" . }}-worker
  labels:
    {{- include "cash.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cash.name" . }}-worker
  minReplicas: {{ .Values.worker.hpa.minReplicas }}
  maxReplicas: {{ .Values.worker.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.hpa.targetCPUUtilizationPercentage }}
{{- end }}
