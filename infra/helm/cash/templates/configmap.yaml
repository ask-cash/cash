apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cash.name" . }}-config
  labels:
    {{- include "cash.labels" . | nindent 4 }}
data:
  REDIS_URL: {{ .Values.redis.url | quote }}
  CONNECTOR_SHARD_TOTAL: {{ .Values.connector.replicas | quote }}
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
