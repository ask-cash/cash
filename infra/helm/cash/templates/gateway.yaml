apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cash.name" . }}-gateway
  labels:
    {{- include "cash.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cash.name" . }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "cash.labels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: gateway
          image: {{ include "cash.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["gateway"]
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
          envFrom:
            {{- include "cash.envFrom" . | nindent 12 }}
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cash.name" . }}-gateway
  labels:
    {{- include "cash.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  selector:
    app.kubernetes.io/name: {{ include "cash.name" . }}
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 80
      targetPort: http
---
{{- if .Values.gateway.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cash.name" . }}-gateway
  labels:
    {{- include "cash.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cash.name" . }}-gateway
  minReplicas: {{ .Values.gateway.hpa.minReplicas }}
  maxReplicas: {{ .Values.gateway.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway.hpa.targetCPUUtilizationPercentage }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "cash.name" . }}-gateway
  labels:
    {{- include "cash.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cash.name" . }}
      app.kubernetes.io/component: gateway
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cash.name" . }}-gateway
  labels:
    {{- include "cash.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cash.name" . }}-gateway
                port:
                  number: 80
{{- end }}
