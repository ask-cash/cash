image:
  repository: ghcr.io/alg0-labs/cash
  tag: latest
  pullPolicy: IfNotPresent

client:
  image:
    repository: ghcr.io/alg0-labs/cash-client
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits:   {cpu: 250m, memory: 128Mi}
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

redis:
  # Local/test override only. Production REDIS_URL is sourced from the External
  # Secret below so credentials never land in a ConfigMap.
  url: ""

# Non-secret configuration -> rendered into a ConfigMap.
config:
  STORAGE_BACKEND: gcs
  GCS_BUCKET: cash-uploads
  GCS_PROJECT: ""
  SECRETS_BACKEND: db
  ENFORCE_TENANT: "true"
  PG_POOL_MIN: "1"
  PG_POOL_MAX: "5"
  PG_POOL_TIMEOUT_SECONDS: "10"
  QUEUE_NAME: "cash:jobs"
  QUEUE_CONSUMER_GROUP: cash-workers
  QUEUE_HEARTBEAT_SECONDS: "60"
  QUEUE_STALE_AFTER_MS: "300000"
  QUEUE_MAX_ATTEMPTS: "3"
  QUEUE_ENQUEUE_DEDUPE_SECONDS: "604800"
  REDIS_CONNECT_TIMEOUT_SECONDS: "5"
  REDIS_SOCKET_TIMEOUT_SECONDS: "10"
  WORKER_CONCURRENCY: "4"
  FREE_CHAT_CONTEXT_TOKENS: "32000"
  PRO_CHAT_CONTEXT_TOKENS: "200000"
  FREE_CHAT_MODELS: claude-haiku-4-5-20251001
  CHAT_REQUESTS_PER_MINUTE: "12"
  CHAT_MAX_ATTACHMENTS: "4"
  CHAT_MAX_ATTACHMENT_BYTES: "10485760"
  CHAT_MAX_MESSAGE_ATTACHMENT_BYTES: "20971520"
  CHAT_TENANT_STORAGE_BYTES: "104857600"
  CHAT_MAX_PROVIDER_IMAGE_BYTES: "7340032"
  CHAT_MAX_IMAGE_EDGE_PIXELS: "8000"
  FREE_CHAT_MAX_PDF_PAGES: "15"
  PRO_CHAT_MAX_PDF_PAGES: "100"
  CHAT_LOCK_WAIT_SECONDS: "5"
  CHAT_LOCK_TTL_SECONDS: "600"
  CHAT_GLOBAL_CONCURRENCY: "80"
  CHAT_CONCURRENCY_LEASE_SECONDS: "720"
  TRANSCRIPTION_MODEL: gpt-4o-mini-transcribe
  TRANSCRIPTION_GLOBAL_CONCURRENCY: "20"
  TRANSCRIPTION_CONCURRENCY_LEASE_SECONDS: "180"
  VOICE_MAX_SECONDS: "90"
  VOICE_MAX_BYTES: "8388608"
  RETENTION_DISPATCH_OUTBOX_DAYS: "7"
  RETENTION_DELIVERED_REMINDER_DAYS: "90"
  RETENTION_DISMISSED_ACTIVITY_DAYS: "30"
  RETENTION_READ_ACTIVITY_DAYS: "90"
  RETENTION_TENANT_BATCH_SIZE: "500"
  RETENTION_OUTBOX_BATCH_SIZE: "1000"
  WORKER_METRICS_PORT: "9000"
  PUBLIC_BASE_URL: "https://api.cash.example.com"
  LOG_LEVEL: INFO
  LOG_JSON: "true"
  METRICS_ENABLED: "true"

# Secrets are pulled from a cloud secret manager via External Secrets Operator
# (preferred) or, for quick installs, set createSecret=true and fill values.
externalSecrets:
  enabled: true
  secretStoreRef: gcp-secret-store          # ClusterSecretStore name
  remoteKeys:
    DATABASE_URL: cash-database-url
    REDIS_URL: cash-redis-url
    REDIS_USERNAME: cash-redis-username
    REDIS_PASSWORD: cash-redis-password
    SECRETS_ENCRYPTION_KEY: cash-secrets-encryption-key
    ANTHROPIC_API_KEY: cash-anthropic-api-key
    TRANSCRIPTION_API_KEY: cash-transcription-api-key
    GOOGLE_OAUTH_CLIENT_ID: cash-google-oauth-client-id
    GOOGLE_OAUTH_CLIENT_SECRET: cash-google-oauth-client-secret
    TELEGRAM_WEBHOOK_SECRET: cash-telegram-webhook-secret
    ADMIN_API_TOKEN: cash-admin-api-token

createSecret: false
secretValues: {}   # used only when createSecret=true (NOT for production)

gateway:
  replicas: 2
  port: 8080
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits:   {cpu: 500m, memory: 512Mi}
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

worker:
  replicas: 2
  resources:
    requests: {cpu: 250m, memory: 768Mi}
    limits:   {cpu: "1",  memory: 2Gi}
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  # Recommended for production: chat and transcription are network-bound, so
  # scale workers on the acknowledged Redis Stream backlog instead of CPU.
  keda:
    enabled: false
    address: ""             # host:port, without scheme or credentials
    enableTLS: true
    databaseIndex: "0"
    pollingInterval: 15
    cooldownPeriod: 120
    minReplicas: 2
    maxReplicas: 40
    streamLengthPerReplica: "8"
    fallbackReplicas: 4
    auth:
      enabled: true
      usernameSecretKey: REDIS_USERNAME
      passwordSecretKey: REDIS_PASSWORD

connector:
  replicas: 1            # also sets CONNECTOR_SHARD_TOTAL
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits:   {cpu: 500m, memory: 512Mi}

ingress:
  enabled: true
  className: nginx
  host: api.cash.example.com
  tls:
    enabled: true
    secretName: cash-api-tls
    clusterIssuer: letsencrypt-prod

serviceMonitor:
  enabled: true        # requires Prometheus Operator CRDs

cron:
  # K8s cron schedules (UTC). Adjust to your tenants' timezone reality.
  jobs:
    - name: morning-briefing
      schedule: "0 1 * * *"     # 06:30 IST-ish
      arg: morning_briefing
    - name: trading-reminder
      schedule: "15 3 * * 1-5"
      arg: trading_reminder
    - name: evening-summary
      schedule: "30 17 * * *"
      arg: evening_summary
    - name: email-check
      schedule: "*/30 * * * *"
      arg: email_check
    - name: directive-expiry
      schedule: "30 21 * * *"
      arg: directive_expiry
    - name: summary-rollup
      schedule: "0 22 * * *"
      arg: summary_rollup
    - name: retention-cleanup
      schedule: "15 2 * * *"
      arg: retention_cleanup

serviceAccount:
  name: cash
  annotations: {}        # e.g. iam.gke.io/gcp-service-account for Workload Identity
